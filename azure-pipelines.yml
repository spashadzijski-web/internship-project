trigger:
- main

variables:
  buildConfiguration: 'Release'

stages:

# 🔹 BUILD
- stage: Build
  displayName: Build & Test
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - script: dotnet restore
      displayName: Restore

    - script: dotnet build --configuration $(buildConfiguration)
      displayName: Build

    - script: dotnet test --configuration $(buildConfiguration) --no-build
      displayName: Test

    - script: dotnet publish MyApp/MyApp.csproj -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)
      displayName: Publish

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop

# 🔹 DEV
- stage: Dev
  displayName: Deploy to Dev
  dependsOn: Build
  jobs:
  - deployment: DeployDev
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
          - script: echo "Deploying to DEV..."

# 🔹 STAGING
- stage: Staging
  displayName: Deploy to Staging
  dependsOn: Dev
  jobs:
  - deployment: DeployStaging
    environment: staging
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
          - script: echo "Deploying to STAGING..."

# 🔴 PRODUCTION (🔥 новото)
- stage: Production
  displayName: Deploy to Production
  dependsOn: Staging

  # 🔥 само от main branch
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - deployment: DeployProd
    environment: production   # 🔐 approval тук
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
          - script: echo "Deploying to PRODUCTION..."