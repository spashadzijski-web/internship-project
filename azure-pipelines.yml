trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

- stage: Build
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - script: dotnet restore
    - script: dotnet build --configuration Release
    
    - script: dotnet publish MyApp/MyApp.csproj -c Release -o $(Build.ArtifactStagingDirectory)
      displayName: 'Publish app'

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop

- stage: Test
  dependsOn: Build
  jobs:
  - job: TestJob
    steps:
    - script: dotnet test --configuration Release --no-build

- stage: Deploy
  dependsOn: Test
  jobs:
  - job: DeployJob
    steps:
    - script: echo "Deploying application..."